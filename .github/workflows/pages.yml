name: Deploy Pages

# 部署 pitch/ + examples/ 里的 HTML 到 GitHub Pages · 手动触发
# 启用步骤：
#   1. repo Settings → Pages → Build and deployment source 选 "GitHub Actions"
#   2. Actions 标签 → "Deploy Pages" → "Run workflow"
# 启用后 URL: https://huannan520.github.io/jcc-replay-analyst/
# 后续自动部署：取消注释下面的 push 触发器即可。

on:
  workflow_dispatch:
  # push:
  #   branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build _site
        run: |
          mkdir -p _site
          # pitch/index.html 作 landing · pitch/roadmap.html 作工程路线图
          cp pitch/index.html _site/index.html
          cp pitch/roadmap.html _site/roadmap.html
          cp pitch/build_log.html _site/build_log.html
          # 示例 HTML 复盘报告
          cp examples/sample_report.html _site/sample_report.html
          # 简单 404 · 避免访问不存在路径崩溃
          cat > _site/404.html <<'HTML'
          <!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
          <title>404 · jcc-replay-analyst</title>
          <style>body{background:#0b0912;color:#e8e5d8;font-family:Songti SC,serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;text-align:center}
          a{color:#c9a45d;text-decoration:none;border-bottom:1px dotted #8b7244}
          a:hover{color:#e6c17a}</style></head>
          <body><div><h1 style="font-size:64px;font-weight:400;color:#c9a45d">四〇四</h1>
          <p>这页没有 · 回 <a href="./">首页</a> · 或 <a href="./roadmap.html">路线图</a> · 或 <a href="./sample_report.html">样例报告</a></p></div></body></html>
          HTML

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
