name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          # CI 只装测试需要的轻量依赖 · 跳过 paddleocr / opencv / vllm（太重 · 本批不测）
          pip install pydantic httpx pillow numpy pytest
      - name: Run tests
        run: pytest tests/test_schema.py tests/test_frame_monitor.py -v
